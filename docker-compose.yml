services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: nodexa
      POSTGRES_PASSWORD: nodexa
      POSTGRES_DB: nodexa
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nodexa"]
      interval: 2s
      timeout: 3s
      retries: 10

  api:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://nodexa:nodexa@db:5432/nodexa

volumes:
  pgdata:
